<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articul8 - Pronunciation Trainer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        'brand': {
          50: '#fff7ed',
          100: '#ffedd5',
          200: '#fed7aa',
          300: '#fdba74',
          400: '#fb923c',
          500: '#f97316',
          600: '#ea580c',
          700: '#c2410c',
          800: '#9a3412',
          900: '#7c2d12'
        }
      },
      fontFamily: {
        'sans': ['Inter', 'system-ui', 'sans-serif']
      }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * {
    -webkit-tap-highlight-color: transparent;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    background-image: 
      radial-gradient(at 20% 0%, rgba(249, 115, 22, 0.15) 0px, transparent 50%),
      radial-gradient(at 80% 0%, rgba(234, 88, 12, 0.1) 0px, transparent 50%),
      radial-gradient(at 50% 100%, rgba(249, 115, 22, 0.05) 0px, transparent 50%);
    min-height: 100vh;
  }
  .glass {
    background: rgba(24, 24, 27, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .waveform-bar {
    width: 3px;
    background: linear-gradient(to top, #f97316, #fb923c);
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
  }
  @keyframes wave {
    0%, 100% { height: 20%; }
    50% { height: 100%; }
  }
  .waveform-bar:nth-child(odd) {
    animation-delay: 0.2s;
  }
  .waveform-bar:nth-child(3n) {
    animation-delay: 0.4s;
  }
  .recording .waveform-bar {
    animation-play-state: running;
  }
  .idle .waveform-bar {
    animation-play-state: paused;
    height: 20% !important;
  }
  .toggle-switch {
    position: relative;
    width: 48px;
    height: 26px;
  }
  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.15);
    transition: .3s;
    border-radius: 34px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background: linear-gradient(135deg, #f97316, #ea580c);
  }
  input:checked + .slider:before {
    transform: translateX(22px);
  }
  .btn-glow:hover {
    box-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
  }
  .karaoke-word {
    transition: all 0.3s ease;
    display: inline-block;
  }
  .karaoke-active {
    color: #f97316;
    transform: scale(1.1);
    font-weight: 600;
  }
  .record-pulse {
    animation: recordPulse 1.5s ease-in-out infinite;
  }
  @keyframes recordPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
  }
</style>
</head>
<body class="text-gray-100 antialiased">
  <div class="max-w-4xl mx-auto px-4 py-4 sm:py-8">
    
    <!-- Header -->
    <header class="glass rounded-2xl p-4 sm:p-5 mb-6">
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 flex items-center justify-center shadow-lg">
            <i class="fas fa-microphone text-white text-lg"></i>
          </div>
          <div>
            <h1 class="text-xl sm:text-2xl font-bold bg-gradient-to-r from-brand-400 to-brand-500 bg-clip-text text-transparent">Articul8</h1>
            <p class="text-xs text-gray-400 hidden sm:block">Master your pronunciation</p>
          </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-4">
          <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/20">
            <i class="fas fa-fire text-brand-400 text-sm"></i>
            <span class="text-sm font-semibold text-brand-300">Day 3 Streak</span>
          </div>
          <div class="w-8 h-8 rounded-full overflow-hidden border-2 border-zinc-700 flex items-center justify-center bg-zinc-800">
            <span class="text-lg">🇺🇸</span>
          </div>
          <button class="w-9 h-9 rounded-xl glass hover:bg-white/5 transition-all flex items-center justify-center">
            <i class="fas fa-cog text-gray-400 text-sm"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="mb-6">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sm font-medium text-gray-300">Daily Progress</span>
        <span class="text-sm font-semibold text-brand-400" id="progressText">0%</span>
      </div>
      <div class="h-2.5 bg-zinc-800 rounded-full overflow-hidden">
        <div id="progressBar" class="h-full bg-gradient-to-r from-brand-500 to-brand-400 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
      </div>
    </div>

    <!-- Main Card -->
    <div class="glass rounded-3xl p-5 sm:p-8 mb-6">
      
      <!-- Problem Sounds Section -->
      <div class="mb-6">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <h2 class="text-lg font-semibold text-gray-200">Problem Sounds</h2>
            <span class="px-3 py-1 rounded-lg bg-brand-500/20 border border-brand-500/30 text-brand-300 text-sm font-bold">[TH]</span>
          </div>
          <button class="text-gray-400 hover:text-brand-400 transition-colors">
            <i class="fas fa-info-circle"></i>
          </button>
        </div>
        
        <div class="bg-zinc-900/60 rounded-2xl p-5 sm:p-6 mb-4 border border-white/5">
          <p id="targetSentence" class="text-xl sm:text-2xl font-medium leading-relaxed text-center text-gray-100">
            Three thin thinkers think thick thoughts
          </p>
        </div>

        <!-- Karaoke Mode + Auto-scroll -->
        <div class="flex flex-wrap items-center gap-4 sm:gap-6">
          <div class="flex items-center gap-3">
            <label class="toggle-switch">
              <input type="checkbox" id="karaokeToggle">
              <span class="slider"></span>
            </label>
            <span class="text-sm font-medium text-gray-300">Karaoke Mode</span>
          </div>
          <div class="flex items-center gap-2">
            <input type="checkbox" id="autoScroll" class="w-4 h-4 rounded bg-zinc-800 border-zinc-700 text-brand-500 focus:ring-brand-500 focus:ring-offset-0" checked>
            <label for="autoScroll" class="text-sm font-medium text-gray-300">Auto-scroll</label>
          </div>
        </div>
      </div>

      <!-- Waveform Areas -->
      <div class="grid md:grid-cols-2 gap-4 mb-6">
        <!-- TUTOR Waveform -->
        <div class="bg-zinc-900/60 rounded-2xl p-4 border border-white/5">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">TUTOR</span>
            <i class="fas fa-volume-up text-brand-400 text-sm"></i>
          </div>
          <div id="tutorWaveform" class="h-20 flex items-center justify-center gap-1 idle">
            <!-- Waveform bars generated by JS -->
          </div>
        </div>

        <!-- YOU Waveform -->
        <div class="bg-zinc-900/60 rounded-2xl p-4 border border-white/5">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">YOU</span>
            <div id="recordingIndicator" class="hidden">
              <span class="flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
              </span>
            </div>
          </div>
          <div id="userWaveform" class="h-20 flex items-center justify-center gap-1 idle">
            <!-- Waveform bars generated by JS -->
          </div>
        </div>
      </div>

      <!-- Control Buttons -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="col-span-1">
          <button id="listenBtn" class="w-full px-4 py-3.5 rounded-xl bg-zinc-800 hover:bg-zinc-700 border border-white/5 transition-all flex items-center justify-center gap-2 group">
            <i class="fas fa-headphones text-brand-400 group-hover:scale-110 transition-transform"></i>
            <span class="font-medium text-sm">Listen</span>
          </button>
          <div class="flex gap-1 mt-2 justify-center">
            <button class="speedBtn px-2 py-1 rounded-md bg-zinc-800 text-xs font-medium text-gray-400 hover:bg-brand-500/20 hover:text-brand-300 transition-all" data-speed="0.8">0.8x</button>
            <button class="speedBtn px-2 py-1 rounded-md bg-brand-500/20 text-xs font-medium text-brand-300 transition-all" data-speed="1.0">1.0x</button>
          </div>
        </div>

        <div class="col-span-1">
          <button id="recordBtn" class="w-full px-4 py-3.5 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 transition-all btn-glow flex items-center justify-center gap-2 font-semibold shadow-lg shadow-brand-500/20">
            <i class="fas fa-microphone"></i>
            <span class="text-sm">Record</span>
          </button>
          <div id="micError" class="hidden mt-2 text-xs text-red-400 text-center leading-tight">
            <i class="fas fa-exclamation-triangle mr-1"></i>
            Microphone blocked. Click the lock icon in address bar to enable
          </div>
        </div>

        <button id="playbackBtn" class="px-4 py-3.5 rounded-xl bg-zinc-800 hover:bg-zinc-700 border border-white/5 transition-all flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-play text-gray-400"></i>
          <span class="font-medium text-sm">Playback</span>
        </button>

        <button id="completeBtn" class="px-4 py-3.5 rounded-xl bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 transition-all flex items-center justify-center gap-2 group">
          <i class="fas fa-check text-emerald-400 group-hover:scale-110 transition-transform"></i>
          <span class="font-medium text-sm text-emerald-300">Mark Complete</span>
        </button>
      </div>
    </div>

    <!-- Tongue Twisters Section -->
    <div class="glass rounded-3xl p-5 sm:p-8">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-200">Tongue Twisters</h2>
        <span class="px-3 py-1 rounded-lg bg-purple-500/20 border border-purple-500/30 text-purple-300 text-xs font-bold">ADVANCED</span>
      </div>
      
      <div class="bg-zinc-900/60 rounded-2xl p-5 sm:p-6 mb-4 border border-white/5">
        <p class="text-lg sm:text-xl font-medium leading-relaxed text-center text-gray-100">
          Red lorry, yellow lorry
        </p>
      </div>
      
      <button id="practiceTwister" class="w-full py-3 rounded-xl bg-zinc-800 hover:bg-zinc-700 border border-white/5 transition-all flex items-center justify-center gap-2 font-medium">
        <i class="fas fa-redo text-brand-400"></i>
        <span>Practice This Twister</span>
      </button>
    </div>

  </div>

  <script>
    // State
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let hasRecording = false;
    let currentSpeed = 1.0;
    let karaokeInterval = null;
    let progress = 0;

    // Elements
    const recordBtn = document.getElementById('recordBtn');
    const listenBtn = document.getElementById('listenBtn');
    const playbackBtn = document.getElementById('playbackBtn');
    const completeBtn = document.getElementById('completeBtn');
    const micError = document.getElementById('micError');
    const karaokeToggle = document.getElementById('karaokeToggle');
    const targetSentence = document.getElementById('targetSentence');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const tutorWaveform = document.getElementById('tutorWaveform');
    const userWaveform = document.getElementById('userWaveform');
    const recordingIndicator = document.getElementById('recordingIndicator');
    const practiceTwister = document.getElementById('practiceTwister');

    // Initialize waveforms
    function createWaveform(container, count = 40) {
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = Math.random() * 60 + 20 + '%';
        container.appendChild(bar);
      }
    }

    createWaveform(tutorWaveform);
    createWaveform(userWaveform);

    // Speed selector
    document.querySelectorAll('.speedBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.speedBtn').forEach(b => {
          b.classList.remove('bg-brand-500/20', 'text-brand-300');
          b.classList.add('bg-zinc-800', 'text-gray-400');
        });
        btn.classList.remove('bg-zinc-800', 'text-gray-400');
        btn.classList.add('bg-brand-500/20', 'text-brand-300');
        currentSpeed = parseFloat(btn.dataset.speed);
      });
    });

    // Record button logic
    recordBtn.addEventListener('click', async () => {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          micError.classList.add('hidden');
          
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          
          mediaRecorder.ondataavailable = (e) => {
            audioChunks.push(e.data);
          };
          
          mediaRecorder.onstop = () => {
            hasRecording = true;
            playbackBtn.disabled = false;
            stream.getTracks().forEach(track => track.stop());
          };
          
          mediaRecorder.start();
          isRecording = true;
          
          recordBtn.innerHTML = '<i class="fas fa-stop"></i><span class="text-sm">Stop</span>';
          recordBtn.classList.add('record-pulse', 'from-red-500', 'to-red-600');
          recordBtn.classList.remove('from-brand-500', 'to-brand-600');
          userWaveform.classList.remove('idle');
          userWaveform.classList.add('recording');
          recordingIndicator.classList.remove('hidden');
          
        } catch (err) {
          console.error('Mic access error:', err);
          micError.classList.remove('hidden');
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        
        recordBtn.innerHTML = '<i class="fas fa-microphone"></i><span class="text-sm">Record</span>';
        recordBtn.classList.remove('record-pulse', 'from-red-500', 'to-red-600');
        recordBtn.classList.add('from-brand-500', 'to-brand-600');
        userWaveform.classList.remove('recording');
        userWaveform.classList.add('idle');
        recordingIndicator.classList.add('hidden');
      }
    });

    // Listen button - simulate tutor audio
    listenBtn.addEventListener('click', () => {
      tutorWaveform.classList.remove('idle');
      tutorWaveform.classList.add('recording');
      listenBtn.disabled = true;
      
      if (karaokeToggle.checked) {
        runKaraoke();
      }
      
      setTimeout(() => {
        tutorWaveform.classList.remove('recording');
        tutorWaveform.classList.add('idle');
        listenBtn.disabled = false;
        stopKaraoke();
      }, 3000 / currentSpeed);
    });

    // Playback button
    playbackBtn.addEventListener('click', () => {
      if (!hasRecording) return;
      userWaveform.classList.remove('idle');
      userWaveform.classList.add('recording');
      playbackBtn.disabled = true;
      
      setTimeout(() => {
        userWaveform.classList.remove('recording');
        userWaveform.classList.add('idle');
        playbackBtn.disabled = false;
      }, 3000);
    });

    // Complete button
    completeBtn.addEventListener('click', () => {
      if (progress < 100) {
        progress = Math.min(progress + 20, 100);
        progressBar.style.width = progress + '%';
        progressText.textContent = progress + '%';
        
        completeBtn.classList.add('scale-95');
        setTimeout(() => completeBtn.classList.remove('scale-95'), 150);
        
        if (progress === 100) {
          setTimeout(() => {
            alert('Great job! Daily goal complete 🎉');
          }, 300);
        }
      }
    });

    // Karaoke mode
    karaokeToggle.addEventListener('change', (e) => {
      if (!e.target.checked) {
        stopKaraoke();
      }
    });

    function runKaraoke() {
      const text = 'Three thin thinkers think thick thoughts';
      const words = text.split(' ');
      targetSentence.innerHTML = words.map(w => `<span class="karaoke-word">${w}</span>`).join(' ');
      const wordEls = targetSentence.querySelectorAll('.karaoke-word');
      
      let idx = 0;
      stopKaraoke();
      
      karaokeInterval = setInterval(() => {
        wordEls.forEach(el => el.classList.remove('karaoke-active'));
        if (idx < wordEls.length) {
          wordEls[idx].classList.add('karaoke-active');
          idx++;
        } else {
          stopKaraoke();
        }
      }, 500 / currentSpeed);
    }

    function stopKaraoke() {
      if (karaokeInterval) {
        clearInterval(karaokeInterval);
        karaokeInterval = null;
      }
      const words = document.querySelectorAll('.karaoke-word');
      words.forEach(el => el.classList.remove('karaoke-active'));
    }

    // Practice twister button
    practiceTwister.addEventListener('click', () => {
      targetSentence.textContent = 'Red lorry, yellow lorry';
      progress = 0;
      progressBar.style.width = '0%';
      progressText.textContent = '0%';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Initialize
    progressBar.style.width = '0%';
  </script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
